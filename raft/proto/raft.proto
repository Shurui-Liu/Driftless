syntax = "proto3";

package raft;

option go_package = "github.com/yourorg/raft-coordinator/proto/raftpb";

// ── RequestVote ───────────────────────────────────────────────────────────────

message RequestVoteRequest {
  int64  term           = 1; // candidate's current term
  string candidate_id   = 2; // so peers record who they voted for
  int64  last_log_index = 3; // index of candidate's last log entry
  int64  last_log_term  = 4; // term of candidate's last log entry
}

message RequestVoteResponse {
  int64 term         = 1; // peer's current term (candidate updates if stale)
  bool  vote_granted = 2;
}

// ── AppendEntries ─────────────────────────────────────────────────────────────

message LogEntry {
  int64 term    = 1;
  int64 index   = 2;
  bytes command = 3; // encoded task state transition
}

message AppendEntriesRequest {
  int64          term           = 1; // leader's term
  string         leader_id      = 2; // so followers can redirect clients
  int64          prev_log_index = 3;
  int64          prev_log_term  = 4;
  repeated LogEntry entries     = 5; // empty = heartbeat
  int64          leader_commit  = 6;
}

message AppendEntriesResponse {
  int64 term    = 1; // follower's term (leader steps down if stale)
  bool  success = 2;
}

// ── Service ───────────────────────────────────────────────────────────────────

service RaftCoordinator {
  rpc RequestVote   (RequestVoteRequest)   returns (RequestVoteResponse);
  rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
}
